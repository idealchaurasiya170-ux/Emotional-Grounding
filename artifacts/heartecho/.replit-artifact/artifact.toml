kind = "web"
previewPath = "/"
title = "HeartEcho"
version = "1.0.0"
id = "artifacts/heartecho"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24139

[services.development]
run = "pnpm --filter @workspace/heartecho run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heartecho", "run", "build" ]
publicDir = "artifacts/heartecho/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24139"
BASE_PATH = "/"
